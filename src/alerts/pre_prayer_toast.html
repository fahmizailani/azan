<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pre Prayer Toast</title>
    <link rel="stylesheet" href="./pre_prayer_toast.css" />
  </head>
  <body>
    <main class="toast-shell">
      <section class="toast-card">
        <div class="toast-head">
          <div class="toast-icon-wrap">
            <span class="toast-icon">●</span>
          </div>
          <div class="toast-copy">
            <p id="toast-title" class="toast-title">Asr 4:10 PM</p>
            <p id="toast-sub" class="toast-sub">in 15 minutes</p>
          </div>
        </div>
        <div class="toast-actions">
          <button id="toast-snooze" class="toast-btn ghost" type="button">Snooze</button>
          <button id="toast-dismiss" class="toast-btn solid" type="button">Dismiss</button>
        </div>
      </section>
    </main>
    <script type="module" src="./pre_prayer_toast.js"></script>
  </body>
</html>
