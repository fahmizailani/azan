<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rihla</title>
    <link rel="stylesheet" href="../vendor/maplibre-gl.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header id="main-topbar" class="topbar">
        <div class="topbar-spacer" aria-hidden="true"></div>
        <h1>Rihla</h1>
        <button id="open-settings" type="button" class="icon-btn" aria-label="Open settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
            <path fill-rule="evenodd" d="M6.455 1.45A.5.5 0 0 1 6.952 1h2.096a.5.5 0 0 1 .497.45l.186 1.858a4.996 4.996 0 0 1 1.466.848l1.703-.769a.5.5 0 0 1 .639.206l1.047 1.814a.5.5 0 0 1-.14.656l-1.517 1.09a5.026 5.026 0 0 1 0 1.694l1.516 1.09a.5.5 0 0 1 .141.656l-1.047 1.814a.5.5 0 0 1-.639.206l-1.703-.768c-.433.36-.928.649-1.466.847l-.186 1.858a.5.5 0 0 1-.497.45H6.952a.5.5 0 0 1-.497-.45l-.186-1.858a4.993 4.993 0 0 1-1.466-.848l-1.703.769a.5.5 0 0 1-.639-.206l-1.047-1.814a.5.5 0 0 1 .14-.656l1.517-1.09a5.033 5.033 0 0 1 0-1.694l-1.516-1.09a.5.5 0 0 1-.141-.656L2.46 3.593a.5.5 0 0 1 .639-.206l1.703.769c.433-.36.928-.65 1.466-.848l.186-1.858Zm-.177 7.567-.022-.037a2 2 0 0 1 3.466-1.997l.022.037a2 2 0 0 1-3.466 1.997Z" clip-rule="evenodd" />
          </svg>
        </button>
      </header>

      <section id="dashboard-page" class="page">
        <section class="dashboard-dates">
          <p id="gregorian-datetime" class="date-line">--</p>
          <p id="hijri-date" class="date-line date-hijri">--</p>
        </section>
        <section class="prayer-strip" aria-live="polite">
          <article class="prayer-item" data-prayer-item="Fajr">
            <p class="prayer-name">Fajr</p>
            <span class="prayer-dot" data-prayer-dot="Fajr" aria-hidden="true"></span>
            <p class="prayer-time" data-prayer-time="Fajr">--:--</p>
          </article>
          <article class="prayer-item" data-prayer-item="Dhuhr">
            <p class="prayer-name">Dhuhr</p>
            <span class="prayer-dot" data-prayer-dot="Dhuhr" aria-hidden="true"></span>
            <p class="prayer-time" data-prayer-time="Dhuhr">--:--</p>
          </article>
          <article class="prayer-item" data-prayer-item="Asr">
            <p class="prayer-name">Asr</p>
            <span class="prayer-dot" data-prayer-dot="Asr" aria-hidden="true"></span>
            <p class="prayer-time" data-prayer-time="Asr">--:--</p>
          </article>
          <article class="prayer-item" data-prayer-item="Maghrib">
            <p class="prayer-name">Maghrib</p>
            <span class="prayer-dot" data-prayer-dot="Maghrib" aria-hidden="true"></span>
            <p class="prayer-time" data-prayer-time="Maghrib">--:--</p>
          </article>
          <article class="prayer-item" data-prayer-item="Isha">
            <p class="prayer-name">Isha</p>
            <span class="prayer-dot" data-prayer-dot="Isha" aria-hidden="true"></span>
            <p class="prayer-time" data-prayer-time="Isha">--:--</p>
          </article>
        </section>
        <section class="quran-quote" aria-live="polite">
          <p id="quran-arabic" class="quran-arabic">--</p>
          <p id="quran-pronunciation" class="quran-pronunciation">--</p>
          <p id="quran-meaning" class="quran-meaning">--</p>
          <p id="quran-reference" class="quran-reference">--</p>
        </section>
      </section>

      <section id="settings-page" class="page" hidden>
        <header class="settings-head">
          <button id="back-dashboard" type="button" class="icon-btn" aria-label="Back to dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
              <path fill-rule="evenodd" d="M12.5 9.75A2.75 2.75 0 0 0 9.75 7H4.56l2.22 2.22a.75.75 0 1 1-1.06 1.06l-3.5-3.5a.75.75 0 0 1 0-1.06l3.5-3.5a.75.75 0 0 1 1.06 1.06L4.56 5.5h5.19a4.25 4.25 0 0 1 0 8.5h-1a.75.75 0 0 1 0-1.5h1a2.75 2.75 0 0 0 2.75-2.75Z" clip-rule="evenodd" />
            </svg>
          </button>
          <h2>Settings</h2>
        </header>
        <section class="manual-location">
          <div id="location-map" class="location-map" aria-label="Location map"></div>
          <label for="location">Location</label>
          <input
            id="location"
            type="text"
            placeholder="Kuala Lumpur, Malaysia"
            autocomplete="street-address"
          />
          <ul id="location-suggestions" class="suggestions" hidden></ul>
          <button id="load-prayer-times" type="button">Use Current Location</button>

          <hr class="divider" />
          <h2>Alert Sound</h2>
          <div class="sound-format">
            <label for="notification-sound-select">Notification Sound</label>
            <div class="sound-option-row">
              <select id="notification-sound-select" class="sound-select">
                <option value="sound1">Notification Sound 1</option>
                <option value="sound2">Notification Sound 2</option>
              </select>
              <button id="preview-selected-sound" type="button" class="preview-btn" aria-label="Play notification sound">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
                  <path d="M3 3.732a1.5 1.5 0 0 1 2.305-1.265l6.706 4.267a1.5 1.5 0 0 1 0 2.531l-6.706 4.268A1.5 1.5 0 0 1 3 12.267V3.732Z" />
                </svg>
              </button>
            </div>
          </div>

          <hr class="divider" />
          <h2>Time Format</h2>
          <div class="time-format">
            <div class="time-toggle-row">
              <span>12H</span>
              <label class="switch" aria-label="Toggle 12 hour or 24 hour format">
                <input id="time-format-toggle" type="checkbox" />
                <span class="slider"></span>
              </label>
              <span>24H</span>
            </div>
            <p id="time-format-value" class="helper">Current: 12 Hour</p>
          </div>
        </section>
      </section>
    </main>
    <script src="../vendor/maplibre-gl.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
